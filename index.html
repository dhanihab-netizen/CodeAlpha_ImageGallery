<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My Image Gallery</h1>

    <!-- Filter Buttons -->
    <div class="buttons">
        <button>All</button>
        <button>Nature</button>
        <button>Travel</button>
        <button>Food</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="card">
            <img src="images/img1.jpeg" alt="Image 1">
        </div>

        <div class="card">
            <img src="images/img2.jpeg" alt="Image 2">
        </div>

        <div class="card">
            <img src="images/img3.jpeg" alt="Image 3">
        </div>

        <div class="card">
            <img src="images/img4.jpeg" alt="Image 4">
        </div>

        <div class="card">
            <img src="images/img5.jpeg" alt="Image 5">
        </div>

        <div class="card">
            <img src="images/img6.jpeg" alt="Image 6">
        </div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script src="script.js"></script>

</body>
</html>
